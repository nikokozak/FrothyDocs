{{ define "main" }}
<article class="homepage">
  {{ if fileExists "static/images/typewriter_froth.png" }}
  <figure class="home-hero">
    <img src="{{ "images/typewriter_froth.png" | relURL }}" alt="Froth typewriter hero artwork">
  </figure>
  {{ end }}
  <div class="content">
    {{ .Content }}
  </div>
</article>
{{ end }}
